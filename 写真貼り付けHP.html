<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>写真付きホームページ</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* ヘッダー */
    header {
      background-image: url('header.jpg'); /* ← ここをヘッダー画像のパスに変更 */
      background-size: cover;
      background-position: center;
      height: 200px;
    }

    /* メインコンテンツ */
    main {
      padding: 20px;
    }

    /* フッター */
    footer {
      background-image: url('footer.jpg'); /* ← ここをフッター画像のパスに変更 */
      background-size: cover;
      background-position: center;
      height: 100px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header></header>

  <!-- メインコンテンツ -->
  <main>
    <h1>ようこそ</h1>
    <p>ここにホームページの本文が入ります。</p>
  </main>

  <!-- フッター -->
  <footer></footer>

</body>
</html>
