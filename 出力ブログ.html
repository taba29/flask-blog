<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私のブログ</title>
    <style>
        /* ベース設定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        /* ヘッダー */
        header {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #333;
            text-align: center;
        }

        /* メインコンテンツ */
        main {
            max-width: 800px;
            margin: 0 auto;
        }

        .post {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .post h2 {
            font-size: 2rem;
            color: #333;
        }

        .meta {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 10px;
        }

        .content {
            font-size: 1.1rem;
            color: #555;
        }

        /* フッター */
        footer {
            text-align: center;
            font-size: 0.9rem;
            color: #777;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>私のブログ</h1>
    </header>

    <main>
        <section class="post">
            <h2>投稿タイトル</h2>
            <p class="meta">投稿日: 2025年5月7日</p>
            <div class="content">
                <p>ここに投稿内容が表示されます。</p>
            </div>
        </section>
        <!-- 他の投稿も同様に追加 -->
    </main>

    <footer>
        <p>&copy; 2025 私のブログ</p>
    </footer>
</body>
</html>
