<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>電話ボタン</title>
  <style>
    .call-button {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .call-button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <h2>今すぐお電話ください</h2>
  <a class="call-button" href="tel:0312345678">📞 03-1234-5678 に電話する</a>

</body>
</html>
