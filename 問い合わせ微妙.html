<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせフォーム</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .contact-form {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
    }

    .contact-form h2 {
      margin-bottom: 20px;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    .contact-form button {
      width: 100%;
      padding: 12px;
      background-color: #28a745;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .contact-form button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <form class="contact-form" action="https://formsubmit.co/taba002900@gmail.com" method="POST">
    <h2>お問い合わせ</h2>
    <input type="text" name="name" placeholder="お名前" required />
    <input type="email" name="email" placeholder="メールアドレス" required />
    <textarea name="message" rows="5" placeholder="メッセージを入力してください..." required></textarea>
    <button type="submit">送信</button>

    <!-- Bot対策 -->
    <input type="hidden" name="_captcha" value="false">
    <!-- 送信後のリダイレクト先を指定（任意） -->
    <input type="hidden" name="_next" value="https://yourdomain.com/thanks.html">
  </form>

</body>
</html>
