<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ニュースまとめサイト</title>
  <style>
    /* 全体のリセットと基本スタイル */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
    }

    /* ヘッダー */
    header {
      background-color: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin-bottom: 10px;
    }

    nav ul {
      list-style-type: none;
    }

    nav ul li {
      display: inline;
      margin: 0 15px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    /* コンテンツエリア */
    main {
      padding: 20px;
    }

    section {
      margin-bottom: 40px;
    }

    h2 {
      font-size: 24px;
      color: #333;
      margin-bottom: 10px;
    }

    article {
      background-color: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    article h3 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    article p {
      font-size: 16px;
      line-height: 1.5;
    }

    /* フッター */
    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <h1>ニュースまとめサイト</h1>
    <nav>
      <ul>
        <li><a href="#latest-news">最新ニュース</a></li>
        <li><a href="#popular-articles">人気記事</a></li>
        <li><a href="#categories">カテゴリ別</a></li>
      </ul>
    </nav>
  </header>

  <!-- コンテンツエリア -->
  <main>
    <!-- 最新ニュース -->
    <section id="latest-news">
      <h2>最新ニュース</h2>
      <article>
        <h3>最新ニュースタイトル 1</h3>
        <p>ここに最新ニュースの内容が入ります...</p>
      </article>
      <article>
        <h3>最新ニュースタイトル 2</h3>
        <p>ここに最新ニュースの内容が入ります...</p>
      </article>
    </section>

    <!-- 人気記事 -->
    <section id="popular-articles">
      <h2>人気記事</h2>
      <article>
        <h3>人気記事タイトル 1</h3>
        <p>ここに人気記事の内容が入ります...</p>
      </article>
      <article>
        <h3>人気記事タイトル 2</h3>
        <p>ここに人気記事の内容が入ります...</p>
      </article>
    </section>

    <!-- カテゴリ別 -->
    <section id="categories">
      <h2>カテゴリ別</h2>
      <ul>
        <li><a href="#">テクノロジー</a></li>
        <li><a href="#">スポーツ</a></li>
        <li><a href="#">エンタメ</a></li>
      </ul>
    </section>
  </main>

  <!-- フッター -->
  <footer>
    <p>&copy; 2025 ニュースまとめサイト | All rights reserved</p>
  </footer>

  <script>
    // ページ内のリンクをクリックした際、スムーズにスクロールする機能を実装
    document.querySelectorAll('nav ul li a').forEach(link => {
      link.addEventListener('click', function(event) {
        event.preventDefault();
        const sectionId = this.getAttribute('href').substring(1); // hrefの#以降の部分を取得
        const section = document.getElementById(sectionId);
        if (section) {
          window.scrollTo({
            top: section.offsetTop,
            behavior: 'smooth'
          });
        }
      });
    });
  </script>

</body>
</html>
