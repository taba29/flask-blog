<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デザインページ</title>
  <style>
    /* 基本的なページのスタイル */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4; /* 背景色 */
      background-image: url('https://example.com/background.jpg'); /* 背景画像を使用 */
      background-size: cover;
      background-position: center;
      color: #333;
    }

    /* ヘッダーのデザイン */
    header {
      background-color: rgba(0, 0, 0, 0.7); /* 半透明の黒背景 */
      color: white;
      padding: 20px 0;
      text-align: center;
      font-size: 2em;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    /* メインコンテンツのデザイン */
    .content {
      padding: 50px 20px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* 半透明の白背景 */
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 8px;
    }

    .content h2 {
      font-size: 1.8em;
      margin-bottom: 20px;
    }

    .content p {
      font-size: 1.2em;
      line-height: 1.6;
    }

    /* フッターのデザイン */
    footer {
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }

    /* メディアクエリ：画面幅が小さい場合 */
    @media (max-width: 768px) {
      .content {
        padding: 30px 10px;
      }
      header {
        font-size: 1.6em;
      }
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <h1>魅力的なホームページ</h1>
  </header>

  <!-- メインコンテンツ -->
  <div class="content">
    <h2>ようこそ！</h2>
    <p>このページは、デザインにこだわったシンプルで美しいホームページのサンプルです。背景画像や透明なボックスを使用して、視覚的に引き込まれるデザインを目指しました。</p>
    <p>さらに、ヘッダーとフッターをスタイリッシュにデザインし、情報を簡単にアクセスできるようにしています。</p>
  </div>

  <!-- フッター -->
  <footer>
    <p>&copy; 2025 すべての権利を保有</p>
  </footer>

</body>
</html>
