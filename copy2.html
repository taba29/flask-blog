<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ようこそアニメーションページ</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: linear-gradient(to right, #dfe9f3, #ffffff);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      animation: fadeIn 1.5s ease-out;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      animation: slideDown 1s ease-out;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      transition: opacity 0.5s ease;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #007acc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #005b99;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      h1 { font-size: 24px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ようこそ！</h1>
    <p id="message">このページへようこそ。</p>
    <button onclick="changeMessage()">クリックしてみて</button>
  </div>

  <script>
    function changeMessage() {
      const msg = document.getElementById("message");
      msg.style.opacity = 0;
      setTimeout(() => {
        msg.textContent = "アニメーション付きで楽しいね！";
        msg.style.opacity = 1;
      }, 300);
    }
  </script>
</body>
</html>
