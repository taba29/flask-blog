<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ようこそホームページ</title>
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      background-color: #f0f8ff;
      text-align: center;
      padding: 50px;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 20px;
      cursor: pointer;
    }

    p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>ようこそ！</h1>
  <p id="message">このページへようこそ。</p>
  <button onclick="changeMessage()">クリックしてみて</button>

  <script>
    function changeMessage() {
      const msg = document.getElementById("message");
      msg.textContent = "クリックしてくれてありがとう！";
    }
  </script>
</body>
</html>
