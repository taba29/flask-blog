<!DOCTYPE html>
<html lang="ja">
<head>

  <title>動画埋め込みサイト</title>

    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;

    iframe {
      width: 80%;
      height: 480px;
      border: none;
      margin-top: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>動画をご覧ください</h1>
