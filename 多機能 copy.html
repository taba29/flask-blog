<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電話ボタンと閲覧数カウンター統合ページ</title>
    <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: linear-gradient(to right, #b5b9d6,#90f2b7, #dfc38a, #f77276);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      animation: diagonalMove 1.2s ease-in-out;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      transition: opacity 0.5s ease;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #c13e34;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes diagonalMove {
      from {
        opacity: 0;
        transform: translate(-50px, -50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @media (max-width: 500px) {
      h1 { font-size: 24px; }
      button { width: 100%; }
    }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background-color: #f4f4f4;
      margin: 0;
    }

    h1, h2, p {
      color: #333;
    }

    .section {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px 20px;
      margin-bottom: 40px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .call-button {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    .call-button:hover {
      background-color: #218838;
    }

    #counter {
      font-size: 2.5em;
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- ウェルカムセクション -->
  <div class="section">
    <h1>ようこそ！</h1>
    <p>このページは電話ボタンと閲覧数カウンターを備えています。</p>
  </div>

  <!-- 閲覧数カウンター -->
  <div class="section">
    <h2>このページの閲覧数:</h2>
    <div id="counter">0</div>
  </div>

  <!-- 電話ボタン -->
  <div class="section">
    <h2>今すぐお電話ください</h2>
    <a class="call-button" href="tel:0312345678">📞 03-1234-5678 に電話する</a>
  </div>

  <!-- 閲覧数スクリプト -->
  <script>
    // ページ閲覧回数をローカルストレージに保存
    if (localStorage.pageViews) {
      localStorage.pageViews = Number(localStorage.pageViews) + 1;
    } else {
      localStorage.pageViews = 1;
    }

    // カウンター表示を更新
    document.getElementById('counter').textContent = localStorage.pageViews;
  </script>
</body>
<title>動画埋め込みサイト</title>

    body {

    }
    iframe {

      height: 480px;
      border: none;
      margin-top: 20px;
    }
    h1 {

    }

</head>

<title>お問い合わせフォーム</title>
  <style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}
form {
  max-width: 500px;
}
label {
  display: block;
  margin-top: 15px;
}
input, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}
input[type="submit"] {
  margin-top: 20px;
  background-color: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}
input[type="submit"]:hover {
  background-color: #0056b3;
}
</style>
</head>
<body>

<h1>お問い合わせ</h1>

<form action="send.php" method="POST">
<label for="name">お名前（必須）</label>
<input type="text" id="name" name="name" required>

<label for="phone">電話番号（必須）</label>
<input type="tel" id="phone" name="phone" required placeholder="例: 03-1234-5678">

<label for="email">メールアドレス（任意）</label>
<input type="email" id="email" name="email" placeholder="例: example@example.com">

<label for="message">お問い合わせ内容（必須）</label>
<textarea id="message" name="message" rows="5" required></textarea>

<label>
  <input type="checkbox" name="agree" required> 個人情報の取り扱いに同意する
</label>

<input type="submit" value="送信">
</form>

</body>
</style>
</body>
</html>
