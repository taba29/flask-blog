<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>統合ページ</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: linear-gradient(to right, #c6ffdd, #fbd786, #f7797d);
      color: #333;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      animation: fadeIn 1s ease-in-out;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      animation: diagonalMove 1.2s ease-in-out;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      transition: opacity 0.5s ease;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #c13e34;
    }

    .call-button {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .call-button:hover {
      background-color: #218838;
    }

    /* 🔧 右上に固定するボタン */
    .fixed-right {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    form {
      max-width: 500px;
      margin: auto;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    input[type="submit"] {
      margin-top: 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes diagonalMove {
      from {
        opacity: 0;
        transform: translate(-50px, -50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @media (max-width: 500px) {
      h1 { font-size: 24px; }
      button, .call-button, input[type="submit"] { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- 🔔 右上固定の電話ボタン -->
  <a class="call-button fixed-right" href="tel:0312345678">📞 03-1234-5678</a>

  <!-- アニメーション付きセクション -->
  <div class="container">
    <h1>ようこそ！</h1>
    <p>このページは複数の機能を組み合わせています。</p>
    <button>クリックしてね</button>
  </div>

  <!-- お問い合わせフォーム -->
  <div class="container">
    <h2>お問い合わせ</h2>
    <form action="send.php" method="POST">
      <label for="name">お名前（必須）</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">電話番号（必須）</label>
      <input type="tel" id="phone" name="phone" required placeholder="例: 03-1234-5678">

      <label for="email">メールアドレス（任意）</label>
      <input type="email" id="email" name="email" placeholder="例: example@example.com">

      <label for="message">お問い合わせ内容（必須）</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <label>
        <input type="checkbox" name="agree" required> 個人情報の取り扱いに同意する
      </label>

      <input type="submit" value="送信">
    </form>
  </div>

</body>
</html>
