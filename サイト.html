<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>統合ページ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #b5b9d6, #90f2b7, #dfc38a, #f77276);
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .section {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px 20px;
      margin: 20px auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 700px;
      text-align: center;
    }

    .call-button {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    .call-button:hover {
      background-color: #218838;
    }

    #counter {
      font-size: 2.5em;
      color: #444;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      margin-top: 20px;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
    }

    label {
      display: block;
      margin-top: 15px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    input[type="submit"] {
      margin-top: 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
      padding: 10px 20px;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <!-- ウェルカムセクション -->
  <div class="section">
    <h1>ようこそ！</h1>
    <p>このページには電話ボタン、閲覧数カウンター、動画、そしてお問い合わせフォームがあります。</p>
  </div>

  <!-- 閲覧数カウンター -->
  <div class="section">
    <h2>このページの閲覧数:</h2>
    <div id="counter">0</div>
  </div>

  <!-- 電話ボタン -->
  <div class="section">
    <h2>今すぐお電話ください</h2>
    <a class="call-button" href="tel:0312345678">📞 03-1234-5678 に電話する</a>
  </div>

  <!-- YouTube動画埋め込み -->
  <div class="section">
    <h2>動画をご覧ください</h2>
    <p>以下の動画をお楽しみください：</p>
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>

  <!-- お問い合わせフォーム -->
  <div class="section">
    <h2>お問い合わせ</h2>
    <form action="send.php" method="POST">
      <label for="name">お名前（必須）</label>
      <input type="text" id="name" name="name" required>

      <label for="phone">電話番号（必須）</label>
      <input type="tel" id="phone" name="phone" required placeholder="例: 03-1234-5678">

      <label for="email">メールアドレス（任意）</label>
      <input type="email" id="email" name="email" placeholder="例: example@example.com">

      <label for="message">お問い合わせ内容（必須）</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <label>
        <input type="checkbox" name="agree" required> 個人情報の取り扱いに同意する
      </label>

      <input type="submit" value="送信">
    </form>
  </div>

  <!-- 閲覧数スクリプト -->
  <script>
    if (localStorage.pageViews) {
      localStorage.pageViews = Number(localStorage.pageViews) + 1;
    } else {
      localStorage.pageViews = 1;
    }
    document.getElementById('counter').textContent = localStorage.pageViews;
  </script>

</body>
</html>
