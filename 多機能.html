<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電話ボタンと閲覧数カウンター統合ページ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px 20px;
      background-color: #f4f4f4;
      margin: 0;
    }

    h1, h2, p {
      color: #333;
    }

    .section {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 30px 20px;
      margin-bottom: 40px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .call-button {
      display: inline-block;
      background-color: #28a745;
      color: white;
      padding: 15px 25px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    .call-button:hover {
      background-color: #218838;
    }

    #counter {
      font-size: 2.5em;
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- ウェルカムセクション -->
  <div class="section">
    <h1>ようこそ！</h1>
    <p>このページは電話ボタンと閲覧数カウンターを備えています。</p>
  </div>

  <!-- 閲覧数カウンター -->
  <div class="section">
    <h2>このページの閲覧数:</h2>
    <div id="counter">0</div>
  </div>

  <!-- 電話ボタン -->
  <div class="section">
    <h2>今すぐお電話ください</h2>
    <a class="call-button" href="tel:0312345678">📞 03-1234-5678 に電話する</a>
  </div>

  <!-- 閲覧数スクリプト -->
  <script>
    // ページ閲覧回数をローカルストレージに保存
    if (localStorage.pageViews) {
      localStorage.pageViews = Number(localStorage.pageViews) + 1;
    } else {
      localStorage.pageViews = 1;
    }

    // カウンター表示を更新
    document.getElementById('counter').textContent = localStorage.pageViews;
  </script>

</body>
</html>
