<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>斜めアニメーション</title>
  <style>
    body {
      margin: 0;
      font-family: "Helvetica Neue", sans-serif;
      background: linear-gradient(to right, #c6ffdd, #fbd786, #f7797d);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
      animation: diagonalMove 1.2s ease-in-out;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
      transition: opacity 0.5s ease;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #ff6f61;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #c13e34;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes diagonalMove {
      from {
        opacity: 0;
        transform: translate(-50px, -50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
    }

    @media (max-width: 500px) {
      h1 { font-size: 24px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ようこそ！</h1>
    <p id="message">斜めアニメーションのページです。</p>
    <button onclick="changeMessage()">クリックしてみて</button>
  </div>

  <script>
    function changeMessage() {
      const msg = document.getElementById("message");
      msg.style.opacity = 0;
      setTimeout(() => {
        msg.textContent = "緩急つきで斜めに動くアニメーションです！";
        msg.style.opacity = 1;
      }, 300);
    }
  </script>
</body>
</html>
